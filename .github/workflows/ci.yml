name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve release bin path
        run: swift build -c release --show-bin-path

      - name: Build release binaries
        run: swift build -c release

      - name: Run tests
        run: swift test --parallel
