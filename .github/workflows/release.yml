name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-app:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          gh --version

      - name: Build app bundle
        run: bash build-app.sh

      - name: Stamp release assets
        id: asset_names
        run: |
          RAW_NAME="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          SAFE_NAME="${RAW_NAME//\//-}"
          DMG_SOURCE="build/XCodeMCPService.dmg"
          DMG_SHA_SOURCE="${DMG_SOURCE}.sha256"
          ZIP_SOURCE="build/XCodeMCPService.app.zip"
          ZIP_SHA_SOURCE="${ZIP_SOURCE}.sha256"
          DMG_TARGET="build/XCodeMCPService-${SAFE_NAME}.dmg"
          DMG_SHA_TARGET="${DMG_TARGET}.sha256"
          ZIP_TARGET="build/XCodeMCPService-${SAFE_NAME}.zip"
          ZIP_SHA_TARGET="${ZIP_TARGET}.sha256"
          mv "$DMG_SOURCE" "$DMG_TARGET"
          mv "$DMG_SHA_SOURCE" "$DMG_SHA_TARGET"
          mv "$ZIP_SOURCE" "$ZIP_TARGET"
          mv "$ZIP_SHA_SOURCE" "$ZIP_SHA_TARGET"
          echo "artifact_name=xcodemcpservice-${SAFE_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_TARGET" >> "$GITHUB_OUTPUT"
          echo "dmg_sha_path=$DMG_SHA_TARGET" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_TARGET" >> "$GITHUB_OUTPUT"
          echo "zip_sha_path=$ZIP_SHA_TARGET" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset_names.outputs.artifact_name }}
          if-no-files-found: error
          path: |
            build/XCode MCP Service.app
            ${{ steps.asset_names.outputs.dmg_path }}
            ${{ steps.asset_names.outputs.dmg_sha_path }}
            ${{ steps.asset_names.outputs.zip_path }}
            ${{ steps.asset_names.outputs.zip_sha_path }}

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          NOTES_PATH="$RUNNER_TEMP/release-notes.md"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -Fxv "$TAG_NAME" | head -n 1 || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${TAG_NAME}"
          else
            RANGE="$TAG_NAME"
          fi

          {
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "From \`$PREVIOUS_TAG\` to \`$TAG_NAME\`."
              echo
            fi

            COMMITS="$(git log --reverse --pretty='- %s (`%h`)' "$RANGE")"
            if [ -n "$COMMITS" ]; then
              printf '%s\n' "$COMMITS"
            else
              git show --pretty='- %s (`%h`)' --no-patch "$TAG_NAME"
            fi

            echo
            echo "## Full Changelog"
            echo
            echo '```text'
            if [ -n "$PREVIOUS_TAG" ]; then
              git diff --stat "$PREVIOUS_TAG" "$TAG_NAME"
            else
              git show --stat --format='' "$TAG_NAME"
            fi
            echo '```'
          } > "$NOTES_PATH"

          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          DMG_PATH: ${{ steps.asset_names.outputs.dmg_path }}
          DMG_SHA_PATH: ${{ steps.asset_names.outputs.dmg_sha_path }}
          ZIP_PATH: ${{ steps.asset_names.outputs.zip_path }}
          ZIP_SHA_PATH: ${{ steps.asset_names.outputs.zip_sha_path }}
          NOTES_PATH: ${{ steps.release_notes.outputs.notes_path }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file "$NOTES_PATH"
            gh release upload "$TAG_NAME" "$DMG_PATH" "$DMG_SHA_PATH" "$ZIP_PATH" "$ZIP_SHA_PATH" --clobber
            exit 0
          fi
          gh release create "$TAG_NAME" "$DMG_PATH" "$DMG_SHA_PATH" "$ZIP_PATH" "$ZIP_SHA_PATH" \
            --notes-file "$NOTES_PATH" \
            --title "$TAG_NAME"
